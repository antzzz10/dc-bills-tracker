name: Monitor DC Bills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: skip committing/pushing bill updates and skip the site deploy (still runs the real monitor check and sends the real email)'
        type: boolean
        default: false
  schedule:
    - cron: '0 14 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run bill monitoring script
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: node scripts/monitor-bills.js > monitoring-report.txt

      # Data-quality gate: if the updated bills.json fails consistency checks or
      # drifts from golden labels, fail here so nothing is committed or deployed.
      - name: Lint bill data (consistency + golden-label eval)
        run: node scripts/lint-bills.js

      - name: Check for unvalidated bills
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync } from 'fs';
          const data = JSON.parse(readFileSync('src/data/bills.json', 'utf-8'));
          const all = [...(data.bills||[]), ...(data.riders||[]), ...(data.supportBills||[])];
          const unvalidated = all.filter(b => !b.congressValidated);
          if (unvalidated.length > 0) {
            console.log(`⚠️  WARNING: ${unvalidated.length} bill(s) have not been validated against Congress.gov:`);
            unvalidated.forEach(b => console.log(`  - ${b.id} (${(b.billNumbers||[]).join(', ')})`));
            console.log('Run: node scripts/validate-bills.js to validate them.');
          } else {
            console.log('✅ All bills are validated against Congress.gov.');
          }
          EOF

      - name: Check for changes
        id: check_changes
        run: |
          if [ -f bill-status-history.json ]; then
            LATEST=$(cat bill-status-history.json | jq -r '.[-1].timestamp')
            CHANGES_COUNT=$(cat bill-status-history.json | jq -r '.[-1].changes | length')
            SAFE_TIMESTAMP=$(echo $LATEST | tr ':' '-')
            echo "timestamp=$LATEST" >> $GITHUB_OUTPUT
            echo "safe_timestamp=$SAFE_TIMESTAMP" >> $GITHUB_OUTPUT
            echo "changes_count=$CHANGES_COUNT" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Read summary meta
        id: summary_meta
        run: |
          if [ -f monitoring-meta.json ]; then
            HAS_MEANINGFUL=$(jq -r '.hasMeaningfulChanges' monitoring-meta.json)
            PASSED_COUNT=$(jq -r '.passedCount' monitoring-meta.json)
            ERROR_COUNT=$(jq -r '.errorCount' monitoring-meta.json)
            TOTAL_BILLS=$(jq -r '.totalBills' monitoring-meta.json)
            echo "has_meaningful_changes=$HAS_MEANINGFUL" >> $GITHUB_OUTPUT
            echo "passed_count=$PASSED_COUNT" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            echo "total_bills=$TOTAL_BILLS" >> $GITHUB_OUTPUT
          else
            echo "has_meaningful_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload monitoring report
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report-${{ steps.check_changes.outputs.safe_timestamp }}
          path: |
            monitoring-report.txt
            monitoring-summary.html
            monitoring-meta.json
            bill-status-history.json
          retention-days: 90

      - name: Commit and push updates
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --global user.name 'DC Bills Monitor'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bill-status-history.json src/data/bills.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update bill statuses - ${{ steps.check_changes.outputs.timestamp }}"
            git push
          fi

      - name: Rebuild and deploy site
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Rebuilding and deploying site..."
          npm run build

          # Configure git for gh-pages to use GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          npm run deploy
          echo "✅ Deployment complete"

      - name: Send email notification
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >-
            ${{ steps.summary_meta.outputs.has_meaningful_changes == 'true'
              && format('DC Bills: notable changes found - {0}', steps.check_changes.outputs.timestamp)
              || format('DC Bills: no notable changes - {0}', steps.check_changes.outputs.timestamp) }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: DC Bills Monitor <noreply@representdc.org>
          html_body: file://monitoring-summary.html
          ignore_cert: false
